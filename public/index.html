<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraStore API Server</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }
        
        .status {
            display: inline-block;
            background: #10b981;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            margin: 20px 0;
        }
        
        .info {
            background: #f3f4f6;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }
        
        .info h3 {
            color: #374151;
            margin-bottom: 10px;
        }
        
        .info p {
            color: #6b7280;
            margin: 5px 0;
            font-family: monospace;
        }
        
        .links {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .btn-secondary {
            background: #6b7280;
        }
        
        .footer {
            margin-top: 30px;
            color: #9ca3af;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🚀</div>
        <h1>AuraStore API Server</h1>
        <div class="status">✅ Server is running</div>
        
        <div class="info">
            <h3>📡 API Information</h3>
            <p>Base URL: <strong>/api/v1</strong></p>
            <p>Status: <strong style="color: #10b981;">Online</strong></p>
            <p>Environment: <strong id="env">Production</strong></p>
            <p>Deployment: <strong>Vercel</strong></p>
            <p>Timestamp: <strong id="timestamp"></strong></p>
        </div>
        
        <div class="links">
            <a href="/api/v1/health" class="btn">💚 Health Check</a>
            <a href="https://github.com/your-repo" class="btn btn-secondary">📚 Documentation</a>
        </div>
        
        <div class="footer">
            <p>Powered by Node.js + Express + MongoDB + Vercel</p>
            <p>© 2024 AuraStore. All rights reserved.</p>
        </div>
    </div>
    
    <script>
        document.getElementById('timestamp').textContent = new Date().toISOString();
    </script>
</body>
</html>
